version: '3.9'

services:
  app:
    build: .
    ports:
      - '8080:8080'
      - '9000:9000'      # Prometheus metrics endpoint
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - DRAGONFLY_URI=redis://dragonfly:6379
    depends_on:
      - mongo
      - dragonfly
      - prometheus

  mongo:
    image: mongo:6
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  dragonfly:
    image: dragonflydb/dragonfly:latest
    ports:
      - '6379:6379'
    command: ["--logtostderr"]

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  mongo_data:
